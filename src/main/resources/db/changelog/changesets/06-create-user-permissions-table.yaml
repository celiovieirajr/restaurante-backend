              INSERT INTO tb_user_permissions (user_id, permission)
              SELECT id, 'USUARIO_ADD' FROM tb_users WHERE username = 'administrador';
              INSERT INTO tb_user_permissions (user_id, permission)
              SELECT id, 'USUARIO_EDIT' FROM tb_users WHERE username = 'administrador';
              INSERT INTO tb_user_permissions (user_id, permission)
              SELECT id, 'USUARIO_DELETE' FROM tb_users WHERE username = 'administrador';
